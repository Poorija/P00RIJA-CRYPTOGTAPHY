server {
    listen 8585 ssl;
    listen [::]:8585 ssl;
    server_name _;

    include /etc/nginx/mime.types;
    types {
        application/manifest+json webmanifest;
    }

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    location /peerjs/ {
        proxy_pass http://chat-signal:9000/peerjs/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /chat-signal {
        proxy_pass http://chat-signal:9001/chat-signal;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /chat-health {
        proxy_pass http://chat-signal:9000/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /turn-config {
        proxy_pass http://chat-signal:9000/turn-config;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /push/ {
        proxy_pass http://chat-signal:9000/push/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    location = /sw.js {
        default_type application/javascript;
        add_header Cache-Control "no-cache";
    }

    location ^~ /certs/ {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
